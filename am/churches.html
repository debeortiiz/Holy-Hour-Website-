<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ابحث عن كنيسة – Holy Hour</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; color: #333; background: #fff; }

        nav {
            background: linear-gradient(135deg, #1a1a6e 0%, #3b2d8f 100%);
            padding: 0 20px;
        }
        .nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            padding: 14px 0;
        }
        .nav-brand { color: #fff; font-size: 1.3rem; font-weight: 700; text-decoration: none; }
        .nav-links { display: flex; flex-wrap: wrap; gap: 4px; }
        .nav-links a {
            color: #d4c8ff;
            text-decoration: none;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: background 0.2s, color 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }

        .page-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }
        h1 { color: #1a1a6e; font-size: 2rem; margin-bottom: 12px; }
        h1 + p { color: #555; margin-bottom: 30px; line-height: 1.7; }
        h2 {
            color: #2c2c7b;
            border-bottom: 2px solid #2c2c7b;
            padding-bottom: 5px;
            margin: 28px 0 16px;
        }
        h3 { color: #444; }
        .featured-church {
            background-color: #f0f4ff;
            border: 2px solid #2c2c7b;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .featured-church h2 {
            border-bottom: none;
            margin-top: 0;
        }
        .church-card {
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #fafafa;
        }
        .church-card h3 { margin-top: 0; }
        .church-card p { margin: 5px 0; }
        .state-section { margin-bottom: 30px; }
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #3b2d8f;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }

        footer {
            background: #0f0f4a;
            color: #aaa;
            text-align: center;
            padding: 36px 20px;
            font-size: 0.9rem;
            line-height: 1.8;
        }
        footer a { color: #b8a9ff; text-decoration: none; }
        footer a:hover { text-decoration: underline; }
        footer .footer-links { display: flex; justify-content: center; flex-wrap: wrap; gap: 16px; margin-top: 14px; }

        .language-switcher {
            background: #f0eeff;
            text-align: center;
            padding: 18px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
        }
        .language-switcher a {
            color: #3b2d8f;
            text-decoration: none;
            padding: 5px 11px;
            border: 1px solid #c4b8f0;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: background 0.2s, color 0.2s;
        }
        .language-switcher a:hover, .language-switcher a.active {
            background: #3b2d8f;
            color: #fff;
        }
    </style>
</head>
